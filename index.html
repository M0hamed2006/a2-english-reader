<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>PDF App</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:'Cairo',sans-serif;
  touch-action:none;
}

/* viewer full screen */
.box{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* image full screen style */
img{
  max-width:100%;
  max-height:100vh;
  object-fit:contain;
  transform-origin:center;
  transition:transform 0.1s ease;
}

/* page number */
.num{
  position:fixed;
  bottom:10px;
  left:10px;
  background:rgba(0,0,0,0.6);
  color:white;
  padding:6px 10px;
  border-radius:8px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="box">
  <img id="img">
</div>

<div class="num" id="num"></div>

<script>

const images = [
"WhatsApp Image 2026-06-04 at 22.23.23.jpeg",
"WhatsApp Image 2026-06-04 at 22.35.25.jpeg",
"WhatsApp Image 2026-06-04 at 22.38.16.jpeg",
"WhatsApp Image 2026-06-04 at 22.42.57.jpeg",
"WhatsApp Image 2026-06-04 at 22.45.35.jpeg",
"WhatsApp Image 2026-06-04 at 22.50.16.jpeg",
"WhatsApp Image 2026-06-04 at 22.56.30.jpeg",
"WhatsApp Image 2026-06-04 at 23.00.41.jpeg",
"WhatsApp Image 2026-06-04 at 23.50.16.jpeg",
"WhatsApp Image 2026-06-04 at 23.56.47.jpeg",
"WhatsApp Image 2026-06-04 at 23.59.55.jpeg"
];

let i = 0;
let scale = 1;
let startDist = null;

const img = document.getElementById("img");
const num = document.getElementById("num");

function show(){
  img.src = images[i];
  img.style.transform = `scale(${scale})`;
  num.innerText = `${i+1} / ${images.length}`;
}

function next(){
  if(i < images.length-1){
    i++;
    scale = 1;
    show();
  }
}

function prev(){
  if(i > 0){
    i--;
    scale = 1;
    show();
  }
}

/* swipe */
let startX = 0;

img.addEventListener("touchstart", e=>{
  if(e.touches.length == 1)
    startX = e.touches[0].clientX;
});

/* swipe left/right */
img.addEventListener("touchend", e=>{
  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 60) next();
  if(endX - startX > 60) prev();
});

/* pinch zoom */
document.addEventListener("touchmove", function(e){
  if(e.touches.length === 2){

    let dx = e.touches[0].clientX - e.touches[1].clientX;
    let dy = e.touches[0].clientY - e.touches[1].clientY;

    let dist = Math.sqrt(dx*dx + dy*dy);

    if(!startDist) startDist = dist;

    scale = (dist / startDist);

    if(scale < 1) scale = 1;
    if(scale > 4) scale = 4;

    img.style.transform = `scale(${scale})`;
  }
});

document.addEventListener("touchend", ()=>{
  startDist = null;
});

show();

</script>

</body>
</html>
