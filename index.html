<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>A2 PDF App</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:#050816;
  color:white;
  overflow:hidden;
}

/* header */
header{
  padding:14px;
  text-align:center;
  font-size:20px;
  font-weight:900;
  background:linear-gradient(90deg,#2563eb,#7c3aed,#06b6d4);
  box-shadow:0 5px 20px rgba(0,0,0,.4);
}

/* viewer */
.viewer{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* box full screen */
.box{
  width:100%;
  height:100vh;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  position:relative;
}

/* image full screen style */
img{
  max-width:100%;
  max-height:100vh;
  object-fit:contain;
  transform-origin:center;
  transition:transform 0.08s ease;
  border-radius:10px;
}

/* page number */
.num{
  position:absolute;
  bottom:15px;
  left:15px;
  background:rgba(0,0,0,.7);
  padding:6px 12px;
  border-radius:10px;
  font-size:14px;
  backdrop-filter:blur(5px);
}

/* hint */
.hint{
  position:absolute;
  top:60px;
  width:100%;
  text-align:center;
  font-size:12px;
  opacity:0.5;
}
</style>
</head>

<body>

<header>📘 A2 PDF Viewer Pro</header>
<div class="hint">👆 اسحب يمين/شمال + كبّر بصباعين</div>

<div class="viewer">
  <div class="box">
    <img id="img">
    <div class="num" id="num"></div>
  </div>
</div>

<script>

const images = [
"WhatsApp Image 2026-06-04 at 22.23.23.jpeg",
"WhatsApp Image 2026-06-04 at 22.35.25.jpeg",
"WhatsApp Image 2026-06-04 at 22.38.16.jpeg",
"WhatsApp Image 2026-06-04 at 22.42.57.jpeg",
"WhatsApp Image 2026-06-04 at 22.45.35.jpeg",
"WhatsApp Image 2026-06-04 at 22.50.16.jpeg",
"WhatsApp Image 2026-06-04 at 22.56.30.jpeg",
"WhatsApp Image 2026-06-04 at 23.00.41.jpeg",
"WhatsApp Image 2026-06-04 at 23.50.16.jpeg",
"WhatsApp Image 2026-06-04 at 23.56.47.jpeg",
"WhatsApp Image 2026-06-04 at 23.59.55.jpeg"
];

let i = 0;
let scale = 1;
let lastScale = 1;

const img = document.getElementById("img");
const num = document.getElementById("num");

function show(){
  img.src = images[i];
  img.style.transform = `scale(${scale})`;
  num.innerText = `Page ${i+1} / ${images.length}`;
}

function next(){
  if(i < images.length-1){
    i++;
    show();
  }
}

function prev(){
  if(i > 0){
    i--;
    show();
  }
}

/* swipe */
let startX = 0;

img.addEventListener("touchstart", e=>{
  if(e.touches.length === 1){
    startX = e.touches[0].clientX;
  }
});

/* swipe end */
img.addEventListener("touchend", e=>{
  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 60){
    next();
  }
  if(endX - startX > 60){
    prev();
  }
});

/* pinch zoom */
const box = document.querySelector(".box");

box.addEventListener("touchmove", function(e){
  if(e.touches.length === 2){

    let dx = e.touches[0].clientX - e.touches[1].clientX;
    let dy = e.touches[0].clientY - e.touches[1].clientY;

    let dist = Math.sqrt(dx*dx + dy*dy);

    if(!this.startDist) this.startDist = dist;

    scale = (dist / this.startDist) * lastScale;

    if(scale < 1) scale = 1;
    if(scale > 4) scale = 4;

    img.style.transform = `scale(${scale})`;
  }
});

box.addEventListener("touchend", ()=>{
  lastScale = scale;
  box.startDist = null;
});

show();

</script>

</body>
</html>
